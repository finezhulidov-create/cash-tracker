databaseChangeLog:
  - changeSet:
     id: 1-create-users-table
     author : zhulidovdev
     changes :
       - createTable:
           tableName: users
           columns:
             - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  generationType: ALWAYS
                  constraints:
                    nullable: false
                    primaryKey: true

             - column:
                  name: user_name
                  type: VARCHAR(255)


             - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
             - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false






