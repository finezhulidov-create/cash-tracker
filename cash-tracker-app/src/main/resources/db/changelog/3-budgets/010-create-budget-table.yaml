databaseChangeLog:
  - changeSet:
      id: 10-create-budget-table
      author: zhulidovdev
      changes:
        - createTable:
            tableName: budget
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: period
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: limit_amount
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false