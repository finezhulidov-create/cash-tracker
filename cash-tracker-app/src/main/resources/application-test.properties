# spring.datasource.* сюда не прописываем — при подключении Testcontainers
# (Epic 2.6) значения будут подставлены динамически через @DynamicPropertySource,
# перекрывая любой статический url/username/password из этого файла.

spring.liquibase.enabled=true

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

jwt.secret=test-only-secret-not-for-real-use-1234567890
