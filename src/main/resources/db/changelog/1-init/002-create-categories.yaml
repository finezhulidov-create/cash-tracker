databaseChangeLog:
  - changeSet:
      id: 2-create-category-table
      author : zhulidovdev
      changes :
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: category_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false






